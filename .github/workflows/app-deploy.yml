name: Flask App deployed

on:
  workflow_run:
    workflows: ["Docker Build & Push"] # Name of the upstream workflow
    types: [completed]
    branches:
      - mywork
#  workflow_dispatch:

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    env:
      DOCKERHUB_USER : ${{vars.DOCKERHUB_USER}}
      DOCKER_TAG: ${{ github.event.workflow_run.head_sha }}
#      DOCKER_TAG: ${{github.sha}}
    runs-on: self-hosted


    steps:
      - name: checkout Code
        uses: actions/checkout@v4

      - name: setup docker compose on runner 
        uses: docker/setup-compose-action@v2
          
      - name: deploy with docker compose
        run: docker compose down && docker compose up -d --build --force-recreate --pull always 
