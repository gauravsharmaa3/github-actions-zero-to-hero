# API Keys, Sensitive Data, Credentials
# GitLeaks
#

name: Secrets Scan

on:
  workflow_call:


jobs:
  secrets-scan:
    runs-on: ubuntu-latest


    steps:
      - name: checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Run GitLeaks Scanner
        uses: gitleaks/gitleakes-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Manages By GitHub its own
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Only required when you are using github organization
